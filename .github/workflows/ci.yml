name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: make lint

      - run: make test

      - run: make build

      - uses: actions/upload-artifact@v7
        with:
          name: dice-roller
          path: dist/dice-roller.js

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dice-roller

      - uses: softprops/action-gh-release@v3
        with:
          files: dice-roller.js
